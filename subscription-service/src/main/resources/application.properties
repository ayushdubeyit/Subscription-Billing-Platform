spring.application.name=subscription-service


server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/subscription_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

spring.grpc.client.channels.payment-service.address=static://localhost:9090
spring.grpc.client.channels.payment-service.negotiation-type=PLAINTEXT


customer.service.url=http://CUSTOMER-SERVICE/graphql
billing.service.url=http://BILLING-SERVICE/graphql
# Eureka
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true