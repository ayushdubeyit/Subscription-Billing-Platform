server:
  port: 8080

spring:
  application:
    name: graphql-gateway

  graphql:
    graphiql:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info